<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Network Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family: Helvetica, Arial, sans-serif; color:#1f2328; }
  #bar { display:flex; flex-wrap:wrap; gap:10px 14px; align-items:center; padding:10px 14px;
         border-bottom:1px solid #d0d7de; background:#f6f8fa; }
  #bar b { font-size:14px; }
  #bar label { font-size:13px; cursor:pointer; user-select:none; }
  #bar .sep { width:1px; height:18px; background:#d0d7de; }
  #bar select, #bar input { padding:4px 7px; border:1px solid #d0d7de; border-radius:6px; font-size:13px; }
  #bar button { padding:4px 9px; border:1px solid #d0d7de; border-radius:6px; background:#fff; cursor:pointer; font-size:13px; }
  #wrap { display:flex; height:calc(100vh - 84px); }
  #net { flex:1 1 auto; min-width:200px; background:#fff; }
  #dragbar { width:6px; flex:0 0 6px; cursor:col-resize; background:#e6e9ee; }
  #dragbar:hover { background:#cfd6df; }
  #panel { width:380px; flex:0 0 380px; padding:14px; overflow:auto; background:#fbfcfd; font-size:13px; }
  #panel h2 { margin:0 0 4px; font-size:16px; }
  #panel .sub { color:#57606a; margin-bottom:10px; }
  .attr { display:grid; grid-template-columns:96px 1fr; gap:2px 8px; margin-bottom:12px; }
  .attr div.k { color:#57606a; }
  .pctl { margin:6px 0; font-size:12px; }
  table { border-collapse:collapse; width:100%; font-size:12px; }
  th,td { border:1px solid #d8dee4; padding:3px 6px; text-align:left; vertical-align:top; }
  th { background:#eaeef2; position:sticky; top:0; }
  tr.free td { color:#9aa3ad; font-style:italic; }
  .hint { color:#8c959f; }
  .legend span { display:inline-block; margin-right:12px; font-size:12px; }
  .legend i { display:inline-block; width:22px; height:3px; vertical-align:middle; margin-right:4px; }
</style></head>

  <label><input type="checkbox" id="t_zones" checked> <span id="l_zones"></span></label>
  <span class="sep"></span>
  <b id="layoutlbl"></b>
  <select id="layout"></select>
</div>
<div id="bar" style="border-top:none">

  <select id="f_role"></select>
  <select id="f_mfg"></select>
  <select id="f_model"></select>

  <button id="f_reset"></button>
  <span class="sep"></span>
  <input type="search" id="search">
  <span class="legend" id="legend"></span>
</div>
<div id="wrap">

: "#8c959f", "src_if": "ethX7", "dst_if": "1 (1)"}, {"from": "DCS-T001-OBS3-2-Red", "to": "ONB-T001-RFRE-2", "label": "100M copper", "color": "#8c959f", "src_if": "ethX9", "dst_if": "1 (1)"}, {"from": "DCS-T001-OBS3-2-Red", "to": "ONB-T001-ROB-S-1", "label": "100M copper", "color": "#8c959f", "src_if": "ethX10", "dst_if": "1 (1)"}], "linkRules": [{"label": "10G", "color": "#e8820c"}, {"label": "10G", "color": "#e8820c"}, {"label": "10G", "color": "#e8820c"}, {"label": "1G fiber", "color": "#2da44e"}, {"label": "1G copper", "color": "#24292f"}, {"label": "100M copper", "color": "#8c959f"}]};
const L = D.labels;

// ---- Static label wiring ---------------------------------------------------
const setTxt = (id,t)=>{ const el=document.getElementById(id); if(el) el.textContent=t; };
setTxt('title',D.title); setTxt('showlbl',L.show); setTxt('l_mm',L.make_model);
setTxt('l_ip',L.ip); setTxt('l_mask',L.mask); setTxt('l_gw',L.gateway);
setTxt('l_desc',L.description); setTxt('l_edges',L.edge_labels);
setTxt('l_ports',L.ports_on_links); setTxt('l_zones',L.zones);
setTxt('layoutlbl',L.layout); setTxt('filterslbl',L.filters);
document.getElementById('f_text').placeholder = L.serial + ' / ' + L.mac + ' / ' + L.ip + '…';
document.getElementById('search').placeholder = L.search;
document.getElementById('f_reset').textContent = L.reset;
document.getElementById('hint').textContent = L.click_hint;

// ---- Helpers ---------------------------------------------------------------
const esc = s => (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
// Shorten Cisco-style port names so on-edge labels stay readable.
function shortPort(p){
  if(!p) return '';
  return p.replace(/TenGigabitEthernet/i,'Te').replace(/GigabitEthernet/i,'Gi')
          .replace(/FastEthernet/i,'Fa').replace(/Port-channel/i,'Po');
}

// ---- Colors & lookups ------------------------------------------------------
const palette = ["#1f6feb","#2da44e","#bf3989","#9a6700","#8250df","#cf222e","#0969da"];
const siteColor = {}; D.sites.forEach((s,i)=> siteColor[s]=palette[i%palette.length]);
const rawById = {}; D.nodes.forEach(n=> rawById[n.id]=n);

// Current toggle state. Each flag maps to exactly one UI control.
const opt = {mm:false, ip:false, mask:false, gw:false, desc:false,
             edges:true, ports:false, zones:true};

// ---- Label builders --------------------------------------------------------
// Compose a device node label from the active "Show:" toggles.
function nodeLabel(n){
  const x=[n.name]; if(n.role) x.push(n.role);
  if(opt.mm){ const mm=[n.manufacturer,n.model].filter(Boolean).join(' '); if(mm) x.push(mm); }
  if(opt.ip)   x.push(L.ip+': '+(n.ip||L.none));
  if(opt.mask) x.push(L.mask+': '+(n.prefix||L.none));
  if(opt.gw)   x.push(L.gateway+': '+(n.gateway||L.none));
  if(opt.desc && n.description) x.push(n.description);
  return x.join('\n');
}
// Compose an edge label (link type and/or ports). Ports are written as
// src -> dst; the matching directed arrow shows which port sits on which device.
function edgeLabel(e){
  const parts=[];
  if(opt.edges) parts.push(e.label);
  if(opt.ports) parts.push(shortPort(e.src_if)+' → '+shortPort(e.dst_if));
  return parts.join('\n');
}
// Always-on hover text that fully disambiguates an edge's two endpoints.
function edgeTitle(e){
  return `${e.from} (${e.src_if||'?'})  ↔  ${e.to} (${e.dst_if||'?'})`;
}

// ---- Build the network -----------------------------------------------------
const useNB = (D.layout==='netbox' && D.hasPositions);
const nodes = new vis.DataSet(D.nodes.map(n=>{
  const o={id:n.id, label:nodeLabel(n), group:n.site, shape:'box'};
  if(useNB && D.positions[n.id]){ o.x=D.positions[n.id].x; o.y=D.positions[n.id].y; }
  return o;
}));
const edges = new vis.DataSet(D.edges.map((e,i)=>({
  id:'e'+i, from:e.from, to:e.to, label:edgeLabel(e), title:edgeTitle(e),
  color:{color:e.color}, width:2, font:{size:10, color:e.color, strokeWidth:3},
  arrows:{to:{enabled:opt.ports, scaleFactor:0.6}}
})));
const groups={}; D.sites.forEach(s=> groups[s]={color:{background:'#ffffff', border:siteColor[s]}, borderWidth:2});

const net=new vis.Network(document.getElementById('net'),{nodes,edges},{
  groups,
  nodes:{font:{multi:false, face:'Helvetica', size:12, align:'left'}, margin:8},
  edges:{smooth:{type:'continuous'}},
  physics:{enabled:!useNB, stabilization:true, barnesHut:{springLength:180, gravitationalConstant:-9000}},
  interaction:{hover:true, tooltipDelay:120}
});

// ---- Refresh functions (called by the toggles) -----------------------------
function refreshLabels(){ nodes.update(D.nodes.map(n=>({id:n.id, label:nodeLabel(n)}))); }
function refreshEdges(){
  edges.update(D.edges.map((e,i)=>({id:'e'+i, label:edgeLabel(e),
    arrows:{to:{enabled:opt.ports, scaleFactor:0.6}}})));
}
function bind(id,key,fn){ const el=document.getElementById(id);
  if(el) el.addEventListener('change',e=>{opt[key]=e.target.checked; fn();}); }
bind('t_mm','mm',refreshLabels); bind('t_ip','ip',refreshLabels);
bind('t_mask','mask',refreshLabels); bind('t_gw','gw',refreshLabels);
bind('t_desc','desc',refreshLabels);
bind('t_edges','edges',refreshEdges); bind('t_ports','ports',refreshEdges);
bind('t_zones','zones',()=>net.redraw());

// ---- Layout selector (NetBox positions vs automatic) -----------------------
const lsel=document.getElementById('layout');
lsel.innerHTML = `<option value="auto">${esc(L.layout_auto)}</option>`;
if(D.hasPositions){ lsel.insertAdjacentHTML('afterbegin',`<option value="netbox">${esc(L.layout_netbox)}</option>`); }
lsel.value = useNB ? 'netbox' : 'auto';
lsel.addEventListener('change', e=> applyLayout(e.target.value));
function applyLayout(mode){
  if(mode==='netbox' && D.hasPositions){
    net.setOptions({physics:false});
    D.nodes.forEach(n=>{ const p=D.positions[n.id]; if(p) net.moveNode(n.id, p.x, p.y); });
  } else {
    net.setOptions({physics:true});   // re-stabilize into an automatic layout
  }
}

// ---- Location zones (squares), drawn behind nodes, toggled by 'Zones' -------
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function hexA(hex,a){ const n=parseInt(hex.slice(1),16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
net.on('beforeDrawing', ctx=>{
  if(!opt.zones) return;
  D.sites.forEach(site=>{
    const ids=D.nodes.filter(n=>n.site===site).map(n=>n.id).filter(id=>!nodes.get(id).hidden);
    if(!ids.length) return;
    const pos=net.getPositions(ids);
    let a=1e9,b=1e9,c=-1e9,d=-1e9;
    ids.forEach(id=>{const p=pos[id]; if(!p)return; a=Math.min(a,p.x); b=Math.min(b,p.y); c=Math.max(c,p.x); d=Math.max(d,p.y);});
    const pad=80; a-=pad; b-=pad; c+=pad; d+=pad;
    ctx.save();
    ctx.fillStyle=hexA(siteColor[site],0.06); ctx.strokeStyle=siteColor[site];
    ctx.lineWidth=2; ctx.setLineDash([7,5]);
    roundRect(ctx,a,b,c-a,d-b,18); ctx.fill(); ctx.stroke();
    ctx.setLineDash([]); ctx.fillStyle=siteColor[site]; ctx.font='bold 20px Helvetica';
    ctx.fillText(site, a+12, b+26); ctx.restore();
  });
});

// ---- Filters (role / manufacturer / model + free text on serial/mac/ip) ----
function uniq(key){ return [...new Set(D.nodes.map(n=>n[key]).filter(Boolean))].sort(); }
function fillSelect(id, values, label){
  const el=document.getElementById(id);
  el.innerHTML = `<option value="">${esc(label)}</option>` +
    values.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
}
fillSelect('f_role', uniq('role'), L.role);
fillSelect('f_mfg',  uniq('manufacturer'), L.manufacturer);
fillSelect('f_model',uniq('model'), L.model);
function applyFilters(){
  const fr=document.getElementById('f_role').value;
  const fm=document.getElementById('f_mfg').value;
  const fo=document.getElementById('f_model').value;
  const q=document.getElementById('f_text').value.trim().toLowerCase();
  const visible={};
  D.nodes.forEach(n=>{
    let ok=true;
    if(fr && n.role!==fr) ok=false;
    if(fm && n.manufacturer!==fm) ok=false;
    if(fo && n.model!==fo) ok=false;
    if(q){ const hay=[n.name,n.serial,n.ip,(n.macs||[]).join(' ')].join(' ').toLowerCase();
           if(!hay.includes(q)) ok=false; }
    visible[n.id]=ok;
  });
  nodes.update(D.nodes.map(n=>({id:n.id, hidden:!visible[n.id]})));
  edges.update(D.edges.map((e,i)=>({id:'e'+i, hidden: !(visible[e.from] && visible[e.to])})));
}
['f_role','f_mfg','f_model'].forEach(id=>document.getElementById(id).addEventListener('change',applyFilters));
document.getElementById('f_text').addEventListener('keyup',applyFilters);
document.getElementById('f_reset').addEventListener('click',()=>{
  ['f_role','f_mfg','f_model','f_text'].forEach(id=>document.getElementById(id).value='');
  applyFilters();
});

// ---- Detail panel ----------------------------------------------------------
let currentNode=null, connectedOnly=false;
function attrRow(k,v){ return `<div class="k">${esc(k)}</div><div>${esc(v||L.none)}</div>`; }
function renderPanel(){
  const n=currentNode; if(!n) return;
  let h = `<h2>${esc(n.name)}</h2><div class="sub">${esc(n.role||'')} · ${esc(n.site||'')}</div>`;
  h += `<div class="attr">`
     + attrRow(L.manufacturer,n.manufacturer) + attrRow(L.model,n.model)
     + attrRow(L.serial,n.serial) + attrRow(L.ip,n.ip)
     + `<div class="k">${esc(L.mask)}</div><div>${esc(n.prefix||L.none)} ${n.mask?('('+esc(n.mask)+')'):''}</div>`
     + attrRow(L.gateway,n.gateway) + attrRow(L.description,n.description) + `</div>`;
  const ports=(n.ports||[]);
  const shown = connectedOnly ? ports.filter(p=>p.peer) : ports;
  h += `<h2 style="font-size:14px">${esc(L.ports)} (${shown.length}/${ports.length})</h2>`;
  h += `<label class="pctl"><input type="checkbox" id="connonly" ${connectedOnly?'checked':''}> ${esc(L.connected_only)}</label>`;
  if(shown.length){
    h += `<table><tr><th>${esc(L.port)}</th><th>${esc(L.connected_to)}</th><th>${esc(L.mac)}</th><th>${esc(L.vlan)}</th></tr>`;
    shown.forEach(p=>{
      const free = !p.peer;
      const cls = free ? ' class="free"' : '';
      const to = p.peer || (free ? '('+L.free_port+')' : (p.desc||''));
      h += `<tr${cls}><td>${esc(p.port)}</td><td>${esc(to)}</td><td>${esc(p.mac)}</td><td>${esc(p.vlan)}</td></tr>`;
    });
    h += `</table>`;
  }
  const panel=document.getElementById('panel');
  panel.innerHTML = h;
  const cb=document.getElementById('connonly');
  if(cb) cb.addEventListener('change',e=>{ connectedOnly=e.target.checked; renderPanel(); });
}
net.on('click', p=>{ if(p.nodes.length){ currentNode=rawById[p.nodes[0]]; renderPanel(); } });

// ---- Top-right search (focus a device by name) -----------------------------
document.getElementById('search').addEventListener('keyup', e=>{
  const q=e.target.value.trim().toLowerCase(); if(!q) return;
  const hit=D.nodes.find(n=> n.name.toLowerCase().includes(q));
  if(hit){ net.focus(hit.id,{scale:1.1,animation:true}); net.selectNodes([hit.id]);
           currentNode=rawById[hit.id]; renderPanel(); }
});

// ---- Legend ----------------------------------------------------------------
const seen={}; D.linkRules.forEach(r=> seen[r.label]=r.color);
document.getElementById('legend').innerHTML =
  Object.entries(seen).map(([lab,col])=>`<span><i style="background:${col}"></i>${esc(lab)}</span>`).join('');

// ---- Resizable detail panel (drag the divider) -----------------------------
(function(){
  const bar=document.getElementById('dragbar'), panel=document.getElementById('panel');
  let dragging=false;
  bar.addEventListener('mousedown', ()=>{ dragging=true; document.body.style.userSelect='none'; });
  window.addEventListener('mouseup', ()=>{ dragging=false; document.body.style.userSelect=''; });
  window.addEventListener('mousemove', e=>{
    if(!dragging) return;
    const w=Math.min(Math.max(window.innerWidth - e.clientX, 240), window.innerWidth-300);
    panel.style.flexBasis=w+'px'; panel.style.width=w+'px';
  });
})();
document.getElementById('panel').style.flexBasis = (D.panelWidth||380)+'px';
document.getElementById('panel').style.width = (D.panelWidth||380)+'px';
</script></body></html>
